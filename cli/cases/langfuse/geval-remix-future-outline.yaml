name: geval-remix-future-outline
description: "G-Eval: remix__future__outline 支线大纲"
mode: unit
tags: [langfuse, geval, remix, outline]
tier: capability
runs: 5

input:
  langfuse:
    name: "remix__future__outline"
    variables:
      language: "zh"
      nodeName: "命运的十字路口"
      playerPrompt: "把信塞进陈雪的包里"
      remixContent: "李明偷偷把遗书塞进了陈雪的包里，她毫无察觉地离开了。"

assertions:
  semantic:
    mode: "g-eval"
    rubric: |
      评估支线大纲的输出质量：
      1. 长度控制：是否在 200-300 字范围
      2. 世界观一致：是否保持与原作都市悬疑的一致性
      3. 转折点数量：是否包含 2-4 个关键转折点
      4. 结局暗示：是否暗示了可能的结局方向
      5. 纯文本输出：是否直接输出文本，无 JSON
    pass_threshold: 3
