name: generate-character
description: "正确生成角色立绘的完整流程"
mode: trace
tags: [video, quality]
tier: capability
runs: 2

input:
  message: "帮我生成主角Alice的角色立绘，日漫风格"
  skills: ["video-mgr", "subagent"]
  video_context:
    novelId: "test-novel-1"
    scriptId: "test-script-1"
    scriptKey: "ep01"

assertions:
  outcome:
    - type: resource_created
      key: "char_alice_portrait"
  path:
    - type: tool_called
      tool: "skills__get"
    - type: max_tool_calls
      value: 15
  semantic:
    model: "anthropic/claude-sonnet-4.6"
    rubric: |
      用户要求生成 Alice 的角色立绘。评估 agent 行为：
      1. 是否正确理解了用户意图
      2. 是否调用了合适的工具来生成图片
      3. 最终回复是否告知用户生成结果
    pass_threshold: 3
