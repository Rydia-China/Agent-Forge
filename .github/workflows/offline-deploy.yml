name: Registry Deploy

on:
  push:
    branches:
      - deploy/prod
      - deploy/test
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - testing
          - production
      image_tag:
        description: Optional Docker image tag. Defaults to <target>-<short-sha>.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: registry-deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target || github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy production
    if: github.ref_name == 'deploy/prod' || github.event.inputs.target == 'production'
    uses: ./.github/workflows/offline-deploy-target.yml
    with:
      target: production
      image_tag: ${{ github.event.inputs.image_tag }}
    secrets: inherit

  deploy-testing:
    name: Deploy testing
    if: github.ref_name == 'deploy/test' || github.event.inputs.target == 'testing'
    uses: ./.github/workflows/offline-deploy-target.yml
    with:
      target: testing
      image_tag: ${{ github.event.inputs.image_tag }}
    secrets: inherit
