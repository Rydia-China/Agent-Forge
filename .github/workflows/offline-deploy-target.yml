name: Registry Deploy Target

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      image_tag:
        required: false
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Build package and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure SSH
        env:
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Compute deploy metadata
        id: meta
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          INPUT_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_TAG:-}" ]]; then
            image_tag="$INPUT_TAG"
          else
            short_sha="$(git rev-parse --short=12 HEAD)"
            image_tag="${INPUT_TARGET}-${short_sha}"
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"

      - name: Build, push, and deploy registry image
        env:
          SSH_USER: ${{ vars.SSH_USER }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          PROJECT_DIR: ${{ vars.PROJECT_DIR }}
          PUBLIC_HOST: ${{ vars.PUBLIC_HOST }}
          REGISTRY_IMAGE: ${{ vars.REGISTRY_IMAGE }}
          REGISTRY_USERNAME: ${{ vars.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          set -euo pipefail
          test -n "$SSH_USER"
          test -n "$SSH_HOST"
          test -n "$PROJECT_DIR"
          test -n "$PUBLIC_HOST"
          test -n "$REGISTRY_IMAGE"
          test -n "$REGISTRY_USERNAME"
          test -n "$REGISTRY_PASSWORD"

          pnpm deploy:prod -- \
            --mode registry-deploy \
            --tag "$IMAGE_TAG" \
            --skip-git-tag-check \
            --skip-table-sync \
            --skip-remote-pullback \
            --server "${SSH_USER}@${SSH_HOST}" \
            --project-dir "$PROJECT_DIR" \
            --registry-image "$REGISTRY_IMAGE" \
            --public-host "$PUBLIC_HOST"
